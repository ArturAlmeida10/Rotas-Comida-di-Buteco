<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotas do Escadão – Comida di Buteco 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --verde:   #1a4a2e;
  --verde2:  #2d7a4f;
  --amarelo: #f5c842;
  --creme:   #fdf8ee;
  --terra:   #c97d3a;
  --escuro:  #0f1a0f;
  --sidebar-w: 340px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; }

/* ── LAYOUT SHELL ── */
body { display: flex; flex-direction: column; background: var(--escuro); }

header {
  height: 58px; flex-shrink: 0;
  background: var(--verde);
  border-bottom: 2px solid var(--amarelo);
  display: flex; align-items: center;
  padding: 0 20px; gap: 14px;
  z-index: 1001; position: relative;
}
.logo-mark {
  width: 34px; height: 34px; background: var(--amarelo);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 900; color: var(--creme);
  letter-spacing: -0.3px; flex: 1;
}
.logo-text span { color: var(--amarelo); }
.header-tag {
  font-size: 11px; color: rgba(253,248,238,.55);
  background: rgba(255,255,255,.08);
  padding: 4px 10px; border-radius: 100px; white-space: nowrap;
}

.main-area {
  flex: 1; display: flex; overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: #0f1a0f;
  border-right: 1px solid rgba(245,200,66,.15);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform .3s ease;
  z-index: 900;
}

.sidebar-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; color: var(--creme);
  margin-bottom: 6px;
}
.sidebar-sub {
  font-size: 12px; color: rgba(253,248,238,.45); line-height: 1.4;
}

/* ── SEARCH ── */
.search-wrap {
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.search-inner {
  position: relative;
}
.search-inner input {
  width: 100%; padding: 10px 14px 10px 38px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.07); color: var(--creme);
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
}
.search-inner input::placeholder { color: rgba(253,248,238,.35); }
.search-inner input:focus { border-color: rgba(245,200,66,.5); background: rgba(255,255,255,.1); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.search-dropdown {
  position: absolute; left: 0; right: 0; top: calc(100% + 4px);
  background: #1c2b1c; border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px; overflow: hidden; z-index: 99;
  display: none; max-height: 240px; overflow-y: auto;
}
.search-dropdown.open { display: block; }
.sd-item {
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.06);
  transition: background .15s;
}
.sd-item:hover { background: rgba(255,255,255,.06); }
.sd-item-name { font-size: 13px; font-weight: 500; color: var(--creme); }
.sd-item-sub { font-size: 11px; color: rgba(253,248,238,.4); margin-top: 2px; }

/* ── TABS ── */
.tabs {
  display: flex; flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.tab-btn {
  flex: 1; padding: 11px 8px;
  background: none; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  color: rgba(253,248,238,.45);
  border-bottom: 2px solid transparent;
  transition: all .2s;
}
.tab-btn.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
.tab-btn:hover:not(.active) { color: rgba(253,248,238,.7); }

/* ── ROUTE LIST ── */
.panel { flex: 1; overflow-y: auto; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

.panel-section { padding: 12px 16px 4px; }

.route-card {
  margin-bottom: 8px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04);
  cursor: pointer; overflow: hidden;
  transition: border-color .2s, background .2s;
}
.route-card:hover { background: rgba(255,255,255,.07); }
.route-card.active {
  border-color: var(--amarelo);
  background: rgba(245,200,66,.06);
}

.route-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
}
.route-emoji { font-size: 20px; flex-shrink: 0; }
.route-info { flex: 1; min-width: 0; }
.route-name {
  font-size: 13px; font-weight: 600; color: var(--creme);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-bairros {
  font-size: 11px; color: rgba(253,248,238,.4);
  margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.route-km { font-size: 12px; font-weight: 600; color: var(--amarelo); }
.route-count { font-size: 10px; color: rgba(253,248,238,.4); }
.route-color-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

.route-expanded {
  padding: 0 14px 12px; display: none;
}
.route-card.active .route-expanded { display: block; }
.route-desc { font-size: 12px; color: rgba(253,248,238,.55); line-height: 1.5; margin-bottom: 10px; }

.route-bar-list { list-style: none; }
.route-bar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.05);
  cursor: pointer;
}
.route-bar-item:last-child { border-bottom: none; }
.route-bar-item:hover .rbl-name { color: var(--amarelo); }
.rbl-num {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
}
.rbl-name { font-size: 12px; font-weight: 500; color: var(--creme); flex: 1; min-width: 0; }
.rbl-bairro { font-size: 10px; color: rgba(253,248,238,.35); white-space: nowrap; }

/* ── BAR LIST TAB ── */
.bar-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.05);
  transition: background .15s;
}
.bar-list-item:hover { background: rgba(255,255,255,.04); }
.bli-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.bli-info { flex: 1; min-width: 0; }
.bli-nome { font-size: 13px; font-weight: 500; color: var(--creme);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bli-sub { font-size: 11px; color: rgba(253,248,238,.38); margin-top: 1px; }

/* ── MAP ── */
#map { flex: 1; z-index: 100; }

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  border-radius: 16px !important; padding: 0 !important;
  overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,.45) !important;
  border: none !important; width: 300px !important;
}
.leaflet-popup-content { margin: 0 !important; width: 300px !important; }
.leaflet-popup-tip-container { display: none; }

.popup-img {
  width: 100%; height: 168px; object-fit: cover;
  background: #ddd; display: block;
}
.popup-img-placeholder {
  width: 100%; height: 168px;
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
}
.popup-body { padding: 14px 16px 16px; background: white; }
.popup-route-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; color: white;
  padding: 3px 9px; border-radius: 100px; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .4px;
}
.popup-bar-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1.2;
}
.popup-petisco-nome {
  font-size: 13px; font-weight: 600; color: var(--terra); margin-bottom: 6px;
}
.popup-desc {
  font-size: 12px; color: #555; line-height: 1.55; margin-bottom: 10px;
}
.popup-addr {
  display: flex; align-items: flex-start; gap: 5px;
  font-size: 11px; color: #888;
  padding-top: 8px; border-top: 1px solid #f0f0f0;
}

/* ── FLOATING BADGE ── */
.float-badge {
  position: absolute; bottom: 18px; right: 18px; z-index: 800;
  background: var(--verde); border: 2px solid var(--amarelo);
  color: var(--creme); padding: 6px 16px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,.4); pointer-events: none;
}
.float-badge strong { color: var(--amarelo); }

/* ── MOBILE SIDEBAR TOGGLE ── */
.sidebar-toggle {
  display: none; position: absolute;
  top: 68px; left: 10px; z-index: 1000;
  background: var(--verde); border: 2px solid var(--amarelo);
  color: var(--creme); border-radius: 10px; padding: 8px 12px;
  font-size: 18px; cursor: pointer; line-height: 1;
}

/* Leaflet zoom */
.leaflet-control-zoom {
  border: none !important; border-radius: 12px !important; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.3) !important; margin-right: 14px !important; margin-bottom: 60px !important;
}
.leaflet-control-zoom a {
  background: white !important; color: var(--verde) !important;
  width: 32px !important; height: 32px !important; line-height: 32px !important;
  font-size: 18px !important; border: none !important; font-weight: 300 !important;
}
.leaflet-control-zoom a:hover { background: var(--verde) !important; color: white !important; }
.leaflet-control-attribution { font-size: 9px !important; }

@media (max-width: 700px) {
  .sidebar { position: absolute; top: 58px; left: 0; bottom: 0; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: block; }
  .main-area { position: relative; }
  #map { width: 100%; }
}
</style>
</head>

 "nomes": ["Boemia Social Clube", "Braseiro do Roque", "Churraxcou", "Empório do Bacalhau", "Gastrô Bar da Família", "Hora Extra Bar Gourmet", "Bistrô Aconchego", "Reginaldo's Bar", "Gelados na Brasa"], "bar_ids": [30, 68, 52, 42, 60, 88, 69, 29, 71], "km": 18.7}, {"id": "barra-gigoia", "nome": "Barra & Ilha da Gigóia", "emoji": "🏝️", "cor": "#0096C7", "descricao": "Praias da Barra e a charmosa Ilha da Gigóia — o roteiro mais descolado do Rio", "bairros": "Barra da Tijuca · Ilha da Gigóia", "nomes": ["Restaurante Gaia", "Toca dos Esquilos", "Cantinho da Gigóia", "Deck Bar", "Ilha Gourmet", "Kai", "Restaurante Ilha da Fantasia"], "bar_ids": [89, 99, 90, 48, 74, 73, 57], "km": 4.5}, {"id": "ilhas", "nome": "Circuito das Ilhas", "emoji": "⚓", "cor": "#023E8A", "descricao": "Uma aventura de barca: Paquetá, Ilha do Governador, Tubiacanga, Portuguesa e Cacuia", "bairros": "Paquetá · Ilha do Governador · Tubiacanga · Portuguesa · Cacuia", "nomes": ["Bar do Zé Ilha de Paquetá", "Pastelaria do Lido", "Kumida di Kasa", "Capitania dos Copos", "Brazuca", "Crepe & Cevada", "Biroska do Camarão"], "bar_ids": [18, 84, 75, 28, 43, 55, 50], "km": 18.3}];

// ── Mapa de bar → rota ────────────────────────────────────
const barRoute = {};
ROUTES.forEach(r => r.bar_ids.forEach(id => { barRoute[id] = r; }));

// ── MAP ───────────────────────────────────────────────────
const map = L.map('map', { center: [-22.935, -43.27], zoom: 12, zoomControl: true, preferCanvas: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Icons ─────────────────────────────────────────────────
function makeIcon(cor, dim = false, num = null) {
  const opacity = dim ? 0.22 : 1;
  const inner = num !== null
    ? `<text x="16" y="20" font-size="9" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="700">${num}</text>`
    : `<circle cx="16" cy="16" r="5" fill="rgba(255,255,255,.9)"/>`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40" opacity="${opacity}">
    <path d="M16 0C7.163 0 0 7.163 0 16c0 10.667 16 24 16 24S32 26.667 32 16C32 7.163 24.837 0 16 0z" fill="${cor}" stroke="white" stroke-width="1.5"/>
    ${inner}
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-44] });
}

// ── Popup HTML ─────────────────────────────────────────────
function popupHTML(b, idx) {
  const r = barRoute[idx];
  const badgeStyle = r ? `background:${r.cor}` : 'background:#555';
  const badgeLabel = r ? `${r.emoji} ${r.nome}` : 'Sem rota';
  const fotoEl = b.foto && b.foto !== 'None'
    ? `<img class="popup-img" src="${b.foto}" alt="${b.petisco}" loading="lazy" onerror="this.outerHTML='<div class=popup-img-placeholder style=background:linear-gradient(135deg,#1a4a2e,#2d7a4f)>🍽️</div>'">`
    : `<div class="popup-img-placeholder" style="background:linear-gradient(135deg,#1a4a2e,#2d7a4f)">🍽️</div>`;
  const orderNum = r ? (r.bar_ids.indexOf(idx) + 1) : '';
  const addr = [b.endereco, b.bairro].filter(Boolean).join(', ');
  return `${fotoEl}
  <div class="popup-body">
    <span class="popup-route-badge" style="${badgeStyle}">${badgeLabel}${orderNum ? ` · Parada ${orderNum}` : ''}</span>
    <div class="popup-bar-name">${b.nome}</div>
    <div class="popup-petisco-nome">${b.petisco}</div>
    <div class="popup-desc">${b.descricao}</div>
    <div class="popup-addr">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      ${addr}, Rio de Janeiro
    </div>
  </div>`;
}

// ── Markers ────────────────────────────────────────────────
const markers = [];
const layerGroup = L.layerGroup().addTo(map);

BARES.forEach((b, i) => {
  if (!b.lat || !b.lon) return;
  const r = barRoute[i];
  const cor = r ? r.cor : '#555';
  const m = L.marker([b.lat, b.lon], { icon: makeIcon(cor) })
    .bindPopup(popupHTML(b, i), { maxWidth: 300, minWidth: 300, className: '' });
  m._barIdx = i;
  m._baseCor = cor;
  m.on('mouseover', () => { if (!m._dim) m.setIcon(makeIcon(cor)); });
  m.on('popupopen', () => m.setIcon(makeIcon(cor)));
  m.on('popupclose', () => m.setIcon(makeIcon(cor, m._dim)));
  layerGroup.addLayer(m);
  markers.push(m);
});

function updateCount() {
  document.getElementById('countDisplay').textContent = markers.filter(m => layerGroup.hasLayer(m)).length;
}

// ── Active route state ─────────────────────────────────────
let activeRoute = null;

function selectRoute(routeId) {
  if (activeRoute === routeId) {
    // Deselect
    activeRoute = null;
    document.querySelectorAll('.route-card').forEach(c => c.classList.remove('active'));
    markers.forEach(m => {
      m._dim = false;
      m.setIcon(makeIcon(m._baseCor, false));
      if (!layerGroup.hasLayer(m)) layerGroup.addLayer(m);
    });
    updateCount();
    return;
  }
  activeRoute = routeId;
  document.querySelectorAll('.route-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === routeId);
  });

  const r = ROUTES.find(r => r.id === routeId);
  const activeSet = new Set(r.bar_ids);

  markers.forEach((m, i) => {
    const inRoute = activeSet.has(m._barIdx);
    const orderNum = inRoute ? (r.bar_ids.indexOf(m._barIdx) + 1) : null;
    m._dim = !inRoute;
    m.setIcon(makeIcon(m._baseCor, !inRoute, inRoute ? orderNum : null));
  });

  // Fit map to route
  const pts = r.bar_ids.map(id => [BARES[id].lat, BARES[id].lon]);
  map.fitBounds(pts, { padding: [60, 60], maxZoom: 15 });
  updateCount();
}

function flyToBar(barIdx) {
  const b = BARES[barIdx];
  map.flyTo([b.lat, b.lon], 16, { duration: .7 });
  setTimeout(() => markers.find(m => m._barIdx === barIdx)?.openPopup(), 750);
}

// ── Render route list ──────────────────────────────────────
const routeListEl = document.getElementById('routeList');
ROUTES.forEach(r => {
  const card = document.createElement('div');
  card.className = 'route-card';
  card.dataset.id = r.id;
  card.innerHTML = `
    <div class="route-card-header">
      <div class="route-emoji">${r.emoji}</div>
      <div class="route-info">
        <div class="route-name">${r.nome}</div>
        <div class="route-bairros">${r.bairros}</div>
      </div>
      <div class="route-meta">
        <span class="route-km">${r.km} km</span>
        <span class="route-count">${r.bar_ids.length} bares</span>
      </div>
      <div class="route-color-dot" style="background:${r.cor}"></div>
    </div>
    <div class="route-expanded">
      <div class="route-desc">${r.descricao}</div>
      <ul class="route-bar-list">
        ${r.bar_ids.map((bid, j) => `
          <li class="route-bar-item" data-bar="${bid}">
            <div class="rbl-num" style="background:${r.cor}">${j+1}</div>
            <span class="rbl-name">${BARES[bid].nome}</span>
            <span class="rbl-bairro">${BARES[bid].bairro}</span>
          </li>`).join('')}
      </ul>
    </div>`;
  card.addEventListener('click', e => {
    if (e.target.closest('.route-bar-item')) {
      const bid = parseInt(e.target.closest('.route-bar-item').dataset.bar);
      flyToBar(bid);
      return;
    }
    selectRoute(r.id);
  });
  routeListEl.appendChild(card);
});

// ── Render bar list ────────────────────────────────────────
const barListEl = document.getElementById('barListContainer');
[...BARES].sort((a,b)=>a.nome.localeCompare(b.nome,'pt')).forEach(b => {
  const origIdx = BARES.indexOf(b);
  const r = barRoute[origIdx];
  const cor = r ? r.cor : '#555';
  const div = document.createElement('div');
  div.className = 'bar-list-item';
  div.innerHTML = `
    <div class="bli-dot" style="background:${cor}"></div>
    <div class="bli-info">
      <div class="bli-nome">${b.nome}</div>
      <div class="bli-sub">${b.petisco} · ${b.bairro}</div>
    </div>`;
  div.addEventListener('click', () => flyToBar(origIdx));
  barListEl.appendChild(div);
});

// ── Tabs ────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('panelRoutes').style.display = tab==='routes' ? '' : 'none';
    document.getElementById('panelBars').style.display   = tab==='bars'   ? '' : 'none';
  });
});

// ── Search ─────────────────────────────────────────────────
const searchInput    = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchDropdown.innerHTML = '';
  if (!q) { searchDropdown.classList.remove('open'); return; }

  const hits = BARES.map((b,i)=>({b,i}))
    .filter(({b}) => b.nome.toLowerCase().includes(q) || b.petisco.toLowerCase().includes(q) || b.bairro.toLowerCase().includes(q))
    .slice(0, 9);

  if (!hits.length) {
    searchDropdown.innerHTML = '<div class="sd-item"><div class="sd-item-name" style="color:#666">Nenhum resultado</div></div>';
    searchDropdown.classList.add('open'); return;
  }
  hits.forEach(({b, i}) => {
    const r = barRoute[i];
    const d = document.createElement('div');
    d.className = 'sd-item';
    d.innerHTML = `<div class="sd-item-name">${b.nome}</div>
                   <div class="sd-item-sub">${b.petisco} · ${b.bairro}${r?' · '+r.nome:''}</div>`;
    d.addEventListener('click', () => {
      searchDropdown.classList.remove('open');
      searchInput.value = '';
      flyToBar(i);
    });
    searchDropdown.appendChild(d);
  });
  searchDropdown.classList.add('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('#searchWrap')) searchDropdown.classList.remove('open');
});

// ── Mobile sidebar ─────────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

updateCount();
</script>
</body>
</html>
